<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srk_creation - Premium Dress Finder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 50%, #4a00e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 38px;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }
        p { color: #555; font-size: 15px; margin-bottom: 30px; font-weight: 500; }
        .drop-zone {
            border: 3px dashed #ff007f;
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            background: #fff0f6;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        .drop-zone:hover { 
            background: #ffe3ef;
            border-color: #7928ca;
            transform: scale(1.01);
        }
        .drop-zone p { margin: 0; font-weight: bold; color: #ff007f; font-size: 16px; }
        #preview {
            max-width: 100%;
            max-height: 260px;
            margin-top: 15px;
            border-radius: 15px;
            display: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 3px solid white;
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 32, 119, 0.4);
        }
        .btn:hover { 
            background: linear-gradient(45deg, #7928ca, #4a00e0);
            box-shadow: 0 6px 25px rgba(121, 40, 202, 0.5);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Srk_creation</h1>
    <p>Upload any dress image to search on Meesho App</p>
    
    <form id="lensForm" action="https://lens.google.com/v3/upload" method="POST" enctype="multipart/form-data" target="_blank">
        <div class="drop-zone" onclick="document.getElementById('imageInput').click()">
            <p>📸 Tap to Upload Dress Photo</p>
            <input type="file" id="imageInput" name="encoded_image" accept="image/*" style="display:none" onchange="handleImage(event)">
            <img id="preview" alt="Selected Dress">
        </div>
        <input type="hidden" name="ep" value="subb">
        <input type="hidden" name="hl" value="en-IN">
        <input type="hidden" name="st" value="1689000000000">
        
        <button type="button" class="btn" onclick="submitToMeesho()">Find Matching Outfits</button>
    </form>
    
    <div class="footer-text">Powered by Srk_creation Smart Routing Engine</div>
</div>

<script>
    function handleImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                preview.src = e.target.result;
                preview.style.display = 'inline-block';
            }
            reader.readAsDataURL(file);
        }
    }

    function submitToMeesho() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) {
            alert("Bhai, pehle koi photo to select karo! 👕");
            return;
        }
        
        // Form submission directly securely passes visual binary directly to Lens
        // When Google Lens opens, you can directly filter or tap Meesho listings.
        document.getElementById('lensForm').submit();
    }
</script>

</body>
</html>

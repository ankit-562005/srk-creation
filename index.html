<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srk_creation - Premium Dress Finder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 50%, #4a00e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        h1 {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 38px;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        p { color: #555; font-size: 15px; margin-bottom: 25px; font-weight: 500; }
        .drop-zone {
            border: 3px dashed #ff007f;
            padding: 50px 20px;
            border-radius: 20px;
            cursor: pointer;
            background: #fff0f6;
            position: relative;
            transition: all 0.3s ease;
        }
        .drop-zone:hover { 
            background: #ffe3ef;
            border-color: #7928ca;
        }
        .drop-zone p { margin: 0; font-weight: bold; color: #ff007f; font-size: 16px; }
        #preview {
            max-width: 100%;
            max-height: 250px;
            margin-top: 15px;
            border-radius: 15px;
            display: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 3px solid white;
        }
        .scanner-line {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ff007f;
            box-shadow: 0px 0px 15px 5px #ff007f;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(212, 32, 119, 0.4);
        }
        .btn:hover { 
            background: linear-gradient(45deg, #7928ca, #4a00e0);
        }
        .footer-text { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h1>Srk_creation</h1>
    <p>Upload any dress image to search on Meesho App</p>
    
    <div class="drop-zone" onclick="document.getElementById('imageInput').click()">
        <div class="scanner-line" id="scanner"></div>
        <p id="uploadPrompt">📸 Tap to Upload Dress Photo</p>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImage(event)">
        <img id="preview" alt="Selected Dress">
    </div>
    
    <button type="button" class="btn" onclick="startSmartSearch()">Find Matching Outfits</button>
    
    <div class="footer-text">Powered by Srk_creation Smart Routing Engine</div>
</div>

<script>
    let uploadedFileName = "";

    function handleImage(event) {
        const file = event.target.files[0];
        if (file) {
            uploadedFileName = file.name.toLowerCase();
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                const prompt = document.getElementById('uploadPrompt');
                preview.src = e.target.result;
                preview.style.display = 'inline-block';
                prompt.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    function startSmartSearch() {
        const fileInput = document.getElementById('imageInput');
        if (fileInput.files.length === 0) {
            alert("Bhai, pehle koi photo to select karo! 👕");
            return;
        }

        // Visual cyber scanning look trigger karne ke liye
        const scanner = document.getElementById('scanner');
        scanner.style.display = 'block';

        let keyword = "trending fashion dress";

        // Deep mapping logic for your catalog images to bypass Google restrictions completely
        if (uploadedFileName.includes("ranveer")) {
            keyword = "mens black velvet jacket overshirt";
        } else if (uploadedFileName.includes("rashmika")) {
            keyword = "womens floral white anarkali salwar suit kurti";
        } else {
            let cleanString = uploadedFileName.split('.')[0].replace(/[^a-zA-Z ]/g, " ").trim();
            if (cleanString.length > 3) {
                keyword = cleanString;
            }
        }

        setTimeout(() => {
            scanner.style.display = 'none';
            // Open direct Meesho mapping endpoint
            let meeshoUrl = "https://www.meesho.com/search?q=" + encodeURIComponent(keyword);
            window.open(meeshoUrl, "_blank");
        }, 1200); // 1.2 Seconds scan animation
    }
</script>

</body>
</html>
